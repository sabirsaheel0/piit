{% extends "base.html" %}
{% block content %}
{% include "partials_nav.html" %}
<div class="d-flex">
  {% include "partials_sidebar.html" %}
  <main class="p-4 flex-grow-1">
    <h4>Edit Operator</h4>
    <div id="editAlert"></div>
    <form id="editOperatorForm" class="card p-3">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Full Name</label>
          <input type="text" id="full_name" class="form-control" required minlength="2">
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Status</label>
          <select id="status" class="form-select" required>
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">New Password (Optional)</label>
          <input type="password" id="password" class="form-control" minlength="8">
        </div>
      </div>
      <div class="mt-3">
        <button class="btn btn-primary" type="submit">Save Changes</button>
      </div>
    </form>
  </main>
</div>
{% endblock %}
{% block scripts %}
<script>
  requireAuth();
  bindLogout();
  hydrateCurrentOperator('#currentUserName');

  const operatorId = {{ operator_id }};

  async function loadOperator() {
    try {
      const op = await apiRequest(`/api/operators/${operatorId}`, 'GET', null, true);
      $('#full_name').val(op.full_name);
      $('#email').val(op.email);
      $('#status').val(op.status);
    } catch (error) {
      showAlert('#editAlert', error.message || 'Failed to load operator', 'danger');
    }
  }

  $('#editOperatorForm').on('submit', async function (e) {
    e.preventDefault();
    const payload = {
      full_name: $('#full_name').val(),
      email: $('#email').val(),
      status: $('#status').val(),
      password: $('#password').val() || null,
    };

    try {
      await apiRequest(`/api/operators/${operatorId}`, 'PUT', payload, true);
      showAlert('#editAlert', 'Operator updated successfully', 'success');
    } catch (error) {
      showAlert('#editAlert', error.message || 'Failed to update operator', 'danger');
    }
  });

  loadOperator();
</script>
{% endblock %}
